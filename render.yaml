services:
  - type: web
    name: bharatnatayam-web
    env: docker
    dockerfilepath: Dockerfile
    plan: free
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:10000
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: bharatnatayam-db
          property: connectionString

databases:
  - name: bharatnatayam-db
    plan: free
