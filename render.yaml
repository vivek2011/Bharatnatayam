services:
  - type: web
    name: bharatnatayam-web
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: bharatnatayam-db
          property: connectionString

databases:
  - name: bharatnatayam-db
    plan: free
